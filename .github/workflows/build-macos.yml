name: Build macOS

on:
  workflow_dispatch:

jobs:
 build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew installDist

      - name: Package
        run: |
          mkdir release

          jpackage \
            --type app-image \
            --name "Water Log" \
            --input app/build/install/app/lib \
            --main-jar app.jar \
            --main-class de.tjark.waterlog.App \
            --app-version 1.0.0 \
            --vendor "Anders Digital Studio" \
            --dest release

      - name: Inspect app bundle
        run: |
          echo "===== Contents ====="
          find "release/Water Log.app/Contents" -maxdepth 2

          echo ""
          echo "===== Contents/app ====="
          ls -la "release/Water Log.app/Contents/app"

      - name: Verify app
        run: |
          codesign --verify --deep --verbose=4 "release/Water Log.app" || true

      - name: Create ZIP
        run: |
          cd release
          ditto -c -k --sequesterRsrc --keepParent "Water Log.app" WaterLog-macOS.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterLog-macOS
          path: release/WaterLog-macOS.zip