name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            archive: zip

          - os: ubuntu-latest
            archive: tar

          - os: macos-latest
            archive: tar

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: gradle

      - name: Make Gradle executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build application
        run: ./gradlew :app:installDist

      - name: Package ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path app/build/install/app/* `
            -DestinationPath WaterLog-Windows.zip

      - name: Package TAR (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf WaterLog-${{ runner.os }}.tar.gz \
          -C app/build/install app

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WaterLog-Windows.zip
            WaterLog-Linux.tar.gz
            WaterLog-macOS.tar.gz